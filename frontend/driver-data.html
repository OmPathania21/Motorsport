<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Driver Data</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Manrope:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/driver-data.css">
</head>
<body>
    <video id="driverDataBackgroundVideo" class="driver-data-video" autoplay muted loop playsinline preload="metadata" aria-hidden="true">
        <source src="Media/driver.mp4" type="video/mp4">
    </video>

    <main class="driver-data-page">
        <header class="driver-data-header">
            <div>
                <p class="kicker">SQL TABLE VIEW</p>
                <h1>Driver Data</h1>
                <p id="contextMeta" class="context-meta">Loading championship context...</p>
            </div>
            <button id="backToDataButton" class="back-button" type="button">Back</button>
        </header>

        <section class="driver-table-shell">
            <div id="status" class="status" role="status" aria-live="polite">Loading driver rows from database...</div>
            <div class="table-wrap">
                <table class="driver-data-table">
                    <thead>
                        <tr>
                            <th>DriverID</th>
                            <th>DriverName</th>
                            <th>Nationality</th>
                            <th>TeamID</th>
                            <th>TeamName</th>
                        </tr>
                    </thead>
                    <tbody id="driverDataRows">
                        <tr>
                            <td class="muted-cell" colspan="5">Loading driver rows...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <button id="toggleContentButton" class="bg-toggle-button" type="button" aria-pressed="false" title="Hide or show table content">
        bg
    </button>

    <script src="js/driver-data.js"></script>
</body>
</html>
