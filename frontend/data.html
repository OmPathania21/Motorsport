<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Manrope:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/data.css">
</head>
<body>
    <video id="dataBackgroundVideo" class="data-video" autoplay muted loop playsinline preload="auto" aria-hidden="true">
        <source src="Media/Ferrari%20intro.mp4" type="video/mp4">
    </video>

    <div class="bg-grid" aria-hidden="true"></div>
    <div class="glow glow-a" aria-hidden="true"></div>
    <div class="glow glow-b" aria-hidden="true"></div>

    <main class="data-page">
        <section class="data-section race-section" id="raceSection" style="--delay: 460ms;" role="button" tabindex="0" aria-label="Open Race Data page">
            <div class="race-video-shell">
                <video id="raceTableVideo" class="race-table-video" autoplay muted loop playsinline preload="auto" aria-hidden="true">
                    <source src="Media/race_table.mp4" type="video/mp4">
                </video>
            </div>
            <div class="race-label">Race</div>
        </section>

        <section class="data-section team-section" id="teamSection" style="--delay: 620ms;">
            <div class="team-video-shell">
                <video id="teamTableVideo" class="team-table-video" autoplay muted loop playsinline preload="auto" aria-hidden="true">
                    <source src="Media/team.mp4" type="video/mp4">
                </video>
            </div>
            <div class="team-label">Team</div>
        </section>

        <section class="data-section driver-section" id="driverSection" style="--delay: 780ms;">
            <div class="driver-video-shell">
                <video id="driverTableVideo" class="driver-table-video" autoplay muted loop playsinline preload="auto" aria-hidden="true">
                    <source src="Media/driver.mp4" type="video/mp4">
                </video>
            </div>
            <div class="driver-label">Driver</div>
        </section>

        <section class="data-section result-section" id="resultSection" style="--delay: 940ms;">
            <div class="result-media-shell">
                <img class="result-sign-media" src="Media/Lewis%20Sign.gif" alt="" aria-hidden="true">
            </div>
            <div class="result-label">Result</div>
        </section>
    </main>

    <button id="toggleSectionsButton" class="bg-toggle-button" type="button" aria-pressed="false" title="Hide or show sections">
        bg
    </button>

    <script src="js/data.js"></script>
</body>
</html>
